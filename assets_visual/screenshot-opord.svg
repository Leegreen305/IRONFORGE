  <text x="1412" y="196" class="mono" font-size="9" fill="#2a3a4a" text-anchor="end">FM 4-0</text>

  <rect x="868" y="202" width="552" height="140" fill="#07090f" stroke="#171f2b" stroke-width="1"/>
  <text x="880" y="220" class="ui" font-size="10" fill="#8099b0" font-weight="700" letter-spacing="1">a. Logistics</text>
  <text x="880" y="238" class="ui" font-size="11" fill="#b4c8d8">Class III(B): 48-hr on-hand. BSB forward assembly</text>
  <text x="880" y="255" class="ui" font-size="11" fill="#b4c8d8">area vic GR 441882. Class V: two basic loads.</text>
  <text x="880" y="272" class="ui" font-size="11" fill="#b4c8d8">CASEVAC: MEDEVAC on-call, 15-min response.</text>
  <text x="880" y="295" class="ui" font-size="10" fill="#8099b0" font-weight="700" letter-spacing="1">b. Personnel</text>
  <text x="880" y="313" class="ui" font-size="11" fill="#b4c8d8">EPW collection point: BDE rear. CIVCAS reporting</text>
  <text x="880" y="330" class="ui" font-size="11" fill="#b4c8d8">IAW LOAC; G9 coordinates civil affairs.</text>

  <!-- Para 5: C2 -->
  <rect x="868" y="350" width="552" height="20" fill="#0c1118" stroke="#1f2d3e" stroke-width="1"/>
  <text x="880" y="364" class="mono" font-size="10" fill="#4a8fff" letter-spacing="1">5. COMMAND AND SIGNAL</text>

  <rect x="868" y="370" width="552" height="76" fill="#07090f" stroke="#171f2b" stroke-width="1"/>
  <text x="880" y="390" class="ui" font-size="10" fill="#8099b0" font-weight="700" letter-spacing="1">a. Command</text>
  <text x="880" y="408" class="ui" font-size="11" fill="#b4c8d8">BDE TAC CP: GR 438879. BDE MAIN: GR 421850.</text>
  <text x="880" y="426" class="ui" font-size="11" fill="#b4c8d8">Succession: BDE CDR → XO → DCO → BN CDRs.</text>

