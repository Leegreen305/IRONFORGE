  <rect x="308" y="124" width="1112" height="50" fill="#0c1118" stroke="#1f2d3e" stroke-width="1"/>
  <text x="864" y="143" class="mono" font-size="11" fill="#3a5060" text-anchor="middle" letter-spacing="3">OPERATIONS ORDER 01-01</text>
  <text x="864" y="163" class="ui" font-size="15" fill="#ddeeff" text-anchor="middle" font-weight="700">2D BRIGADE COMBAT TEAM — DELIBERATE DEFENSE</text>

  <!-- two-column layout: left=paragraphs 1-3, right=4-5+annexes -->

  <!-- Para 1: SITUATION -->
  <rect x="308" y="182" width="548" height="20" fill="#0c1118" stroke="#1f2d3e" stroke-width="1"/>
  <text x="320" y="196" class="mono" font-size="10" fill="#4a8fff" letter-spacing="1">1. SITUATION</text>
  <text x="820" y="196" class="mono" font-size="9" fill="#2a3a4a" text-anchor="end">FM 6-0 App C</text>

  <rect x="308" y="202" width="548" height="140" fill="#07090f" stroke="#171f2b" stroke-width="1"/>
  <text x="320" y="220" class="ui" font-size="10" fill="#8099b0" font-weight="700" letter-spacing="1">a. Enemy Forces</text>
  <text x="320" y="237" class="ui" font-size="11" fill="#b4c8d8">Peer BTG (-): 3x MR companies, 1x tank co, SP arty btry,</text>
  <text x="320" y="253" class="ui" font-size="11" fill="#b4c8d8">AD element. Organic ISR. Main effort: penetrate FEBA</text>
  <text x="320" y="269" class="ui" font-size="11" fill="#b4c8d8">vic PL IRON and exploit flanks. Support effort: fix BDE</text>
  <text x="320" y="285" class="ui" font-size="11" fill="#b4c8d8">with suppressive fires. COA most likely: frontal breach</text>
  <text x="320" y="301" class="ui" font-size="11" fill="#b4c8d8">with armoured exploitation NLT D+6H.</text>
  <text x="320" y="325" class="ui" font-size="10" fill="#8099b0" font-weight="700" letter-spacing="1">b. Friendly Forces</text>
  <text x="320" y="342" class="ui" font-size="11" fill="#b4c8d8">Higher: DIV defends in sector. BDE left and right in</text>

  <!-- Para 2: MISSION -->
  <rect x="308" y="350" width="548" height="20" fill="#0c1118" stroke="#1f2d3e" stroke-width="1"/>
  <text x="320" y="364" class="mono" font-size="10" fill="#4a8fff" letter-spacing="1">2. MISSION</text>

  <rect x="308" y="370" width="548" height="76" fill="#07090f" stroke="#171f2b" stroke-width="1"/>
  <text x="320" y="390" class="ui" font-size="12" fill="#ddeeff" font-weight="500">2d BCT conducts deliberate defense in sector NLT 061800MAR</text>
  <text x="320" y="408" class="ui" font-size="12" fill="#ddeeff" font-weight="500">to defeat advancing peer BTG, fix and destroy follow-on forces,</text>
  <text x="320" y="426" class="ui" font-size="12" fill="#ddeeff" font-weight="500">and maintain BDE cohesion to allow HHQ reconstitution.</text>

  <!-- Para 3: EXECUTION -->
  <rect x="308" y="454" width="548" height="20" fill="#0c1118" stroke="#1f2d3e" stroke-width="1"/>
  <text x="320" y="468" class="mono" font-size="10" fill="#4a8fff" letter-spacing="1">3. EXECUTION</text>

  <rect x="308" y="474" width="548" height="300" fill="#07090f" stroke="#171f2b" stroke-width="1"/>
  <text x="320" y="492" class="ui" font-size="10" fill="#8099b0" font-weight="700" letter-spacing="1">a. Commander's Intent</text>
  <text x="320" y="510" class="ui" font-size="11" fill="#b4c8d8">Purpose: Defeat BTG main effort. Method: Defense in depth</text>
  <text x="320" y="527" class="ui" font-size="11" fill="#b4c8d8">using two IN BNs forward, one as counterattack force. Canalise</text>
  <text x="320" y="544" class="ui" font-size="11" fill="#b4c8d8">enemy through obstacle complex to engagement areas. End state:</text>
  <text x="320" y="561" class="ui" font-size="11" fill="#b4c8d8">Enemy BTG combat ineffective (&gt;40% attrition), BDE intact.</text>

  <text x="320" y="587" class="ui" font-size="10" fill="#8099b0" font-weight="700" letter-spacing="1">b. Concept of Operations</text>
  <text x="320" y="605" class="ui" font-size="11" fill="#b4c8d8">Phase I (0-6H): BFSB establishes EA forward. IN BNs</text>
  <text x="320" y="622" class="ui" font-size="11" fill="#b4c8d8">occupy battle positions. Obstacle plan executed.</text>
  <text x="320" y="639" class="ui" font-size="11" fill="#b4c8d8">Phase II (6-14H): Conduct defense, attrit enemy in EAs.</text>
  <text x="320" y="656" class="ui" font-size="11" fill="#b4c8d8">Mass fires on HPTL. Deny penetration PL IRON.</text>
  <text x="320" y="673" class="ui" font-size="11" fill="#b4c8d8">Phase III (14-18H): On order, 3d IN BN counterattacks</text>
  <text x="320" y="690" class="ui" font-size="11" fill="#b4c8d8">to restore FEBA or exploit success.</text>

  <text x="320" y="716" class="ui" font-size="10" fill="#8099b0" font-weight="700" letter-spacing="1">c. Tasks to Maneuver Units</text>
  <text x="320" y="734" class="ui" font-size="11" fill="#b4c8d8">1-2 IN: Defend BP ALPHA, priority of fires.</text>
  <text x="320" y="750" class="ui" font-size="11" fill="#b4c8d8">2-2 IN: Defend BP BRAVO, be prepared to displace.</text>
  <text x="320" y="767" class="ui" font-size="11" fill="#b4c8d8">3-2 IN: Counterattack force, OPCON to BDE on order.</text>

  <!-- Right column: paras 4-5 + annexes -->
